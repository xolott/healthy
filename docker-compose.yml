services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthy_dev
      POSTGRES_USER: healthy
      POSTGRES_PASSWORD: healthy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthy -d healthy_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:9.3.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5


  kibana:
    image: kibana:9.3.4
    restart: unless-stopped
    ports:
      - 5601:5601
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - kibana-data:/usr/share/kibana/data
    env_file:
      - .env
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK.SECURITY.ENABLED=false
      - TELEMETRY_OPTIN=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'",
        ]
      interval: 10s
      timeout: 10s
      retries: 120
volumes:
  postgres-data:
  kibana-data:
