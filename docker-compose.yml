services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: healthy_dev
      POSTGRES_USER: healthy
      POSTGRES_PASSWORD: healthy
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthy -d healthy_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
